<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDF Viewer - Simple Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #718096;
            font-size: 1.1rem;
        }

        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f7fafc;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .file-info {
            background: #f7fafc;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            display: none;
        }

        .canvas-container {
            background: white;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 2rem;
            border: 1px solid #e2e8f0;
        }

        #signalCanvas {
            width: 100%;
            height: 400px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">📊 EDF Viewer</h1>
            <p class="subtitle">European Data Format Signal Viewer</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <h2>Drop your EDF file here</h2>
            <p>or click to browse</p>
            <input type="file" id="fileInput" accept=".edf" style="display: none;">
            <button class="btn" onclick="document.getElementById('fileInput').click()">
                Browse Files
            </button>
        </div>

        <div class="file-info" id="fileInfo">
            <h3>File Information</h3>
            <div id="fileDetails"></div>
        </div>

        <div class="canvas-container">
            <canvas id="signalCanvas"></canvas>
            <div class="controls">
                <button class="btn btn-small" onclick="zoomIn()">🔍+</button>
                <button class="btn btn-small" onclick="zoomOut()">🔍-</button>
                <button class="btn btn-small" onclick="panLeft()">←</button>
                <button class="btn btn-small" onclick="panRight()">→</button>
                <span id="timeInfo">Time: 0s - 10s</span>
            </div>
        </div>
    </div>

    <script>
        // File handling
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const fileInfo = document.getElementById('fileInfo');
        const fileDetails = document.getElementById('fileDetails');
        const canvas = document.getElementById('signalCanvas');
        const ctx = canvas.getContext('2d');

        // Initialize canvas
        function initCanvas() {
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#666';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Signal visualization will appear here', canvas.width / 2, canvas.height / 2);
        }

        // File upload handling
        fileInput.addEventListener('change', handleFileSelect);
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('drop', handleDrop);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file && file.name.toLowerCase().endsWith('.edf')) {
                processFile(file);
            } else {
                alert('Please select a valid EDF file (.edf extension)');
            }
        }

        function handleDragOver(event) {
            event.preventDefault();
        }

        function handleDrop(event) {
            event.preventDefault();
            const file = event.dataTransfer.files[0];
            if (file && file.name.toLowerCase().endsWith('.edf')) {
                processFile(file);
            } else {
                alert('Please drop a valid EDF file (.edf extension)');
            }
        }

        function processFile(file) {
            console.log('Processing EDF file:', file.name);
            
            // Show file info
            fileDetails.innerHTML = `
                <p><strong>File Name:</strong> ${file.name}</p>
                <p><strong>File Size:</strong> ${(file.size / 1024 / 1024).toFixed(2)} MB</p>
                <p><strong>File Type:</strong> ${file.type || 'EDF File'}</p>
                <p><strong>Status:</strong> Ready for processing</p>
            `;
            
            fileInfo.style.display = 'block';
            
            // TODO: Implement actual EDF parsing
            setTimeout(() => {
                alert('EDF parsing will be implemented in the next step!');
            }, 1000);
        }

        // Canvas controls
        function zoomIn() {
            console.log('Zoom in');
            // TODO: Implement zoom functionality
        }

        function zoomOut() {
            console.log('Zoom out');
            // TODO: Implement zoom functionality
        }

        function panLeft() {
            console.log('Pan left');
            // TODO: Implement pan functionality
        }

        function panRight() {
            console.log('Pan right');
            // TODO: Implement pan functionality
        }

        // Initialize the app
        initCanvas();
    </script>
</body>
</html>
